<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>
			HTML Forms
		</title>
	</head>
	<body>
		<a target="_blank" href="https://validator.w3.org/nu/?doc=https://singerbladerunnerrat.github.io/HTML_Forms/index.html">Nu Html Checker</a><br>
		<a target="_blank" href="https://validator.w3.org/i18n-checker/check?uri=https://singerbladerunnerrat.github.io/HTML_Forms/#validate-by-uri+">W3C I18n Checker</a><br>
		<br>
		
		<a target="_blank" href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element#forms">https://developer.mozilla.org/en-US/docs/Web/HTML/Element#forms</a><br>
		<br>
		
		<hr>
		<br>
		
		<a target="_blank" href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input/radio">https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input/radio</a><br>
		<br>
		
		<p>Select a maintenance drone:</p>
		
		<div>
			<input type="radio" id="huey" name="drone" value="huey"
			       checked>
			<label for="huey">Huey</label>
		</div>
		
		<div>
			<input type="radio" id="dewey" name="drone" value="dewey">
			<label for="dewey">Dewey</label>
		</div>
		
		<div>
			<input type="radio" id="louie" name="drone" value="louie">
			<label for="louie">Louie</label>
		</div>
		<br>
		
		<hr>
		<br>
		
		<form>
			<p>Please select your preferred contact method:</p>
			<div>
				<input type="radio" id="contactChoice1"
				       name="contact" value="email">
				<label for="contactChoice1">Email<label>
				
				<input type="radio" id="contactChoice2"
				       name="contact" value="phone">
				<label for="contactChoice2">Phone<label>
				
				<input type="radio" id="contactChoice3"
				       name="contact" value="mail">
				<label for="contactChoice3">Mail<label>
			<div>
			<div>
				<button type="submit">Submit</button>
			</div>
		</form>
		<pre id="log">
		</pre>
		<script>
			var form = document.querySelector("form");
			var log = document.querySelector("#log");
			
			form.addEventListener("submit", function(event)
			{
				var data new FormData(form);
				var output = "";
				for (const entry of data)
				{
					output = output + entry[0] + "=" + entry[1] + "\r";
				}
				log.innerText = output;
				event.preventDefault();
			},
			false);
		</script>
	</body>
</html>
